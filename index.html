<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: '8bitOperatorPlus';
            src: url('assets/fonts/8bitOperatorPlus-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: '8bitOperatorPlus', monospace;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            font-smooth: never;
            text-rendering: optimizeSpeed;
        }

        .newsletter-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
            text-align: center;
        }

        .header-img {
            max-width: 90%; 
            height: auto;
            display: block;
            margin: 0 auto 50px auto;
        }

        .start-anim {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 25px auto;
            image-rendering: pixelated;
        }

        .text-content {
            padding: 0 20px; 
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 15px 0;
            text-align: left;
        }

        p:last-child {
            margin-bottom: 0;
        }

        a {
            color: #22c55e;
            text-decoration: none;
            border-bottom: 2px dashed #22c55e;
        }

        a:hover {
            color: #4ade80;
            border-bottom-style: solid;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #52525b;
            margin-top: 50px;
            border-top: 2px solid #27272a;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="newsletter-container">
        
        <img src="assets/images/header.png" alt="DELTARUNE Status Update" class="header-img">

        <div class="text-content">
            <p>... It's Summer.</p>

            <img src="assets/images/start.gif" alt="First Image" class="start-anim">

            <p>Man. Is it just me or is it getting hot out here?</p>
        </div>

    </div>

</body>
</html>
