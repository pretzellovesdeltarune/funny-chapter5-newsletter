<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: '8bitOperatorPlus';
            src: url('assets/fonts/8bitOperatorPlus-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: '8bitOperatorPlus', monospace;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            font-smooth: never;
            text-rendering: optimizeSpeed;
        }

        .newsletter-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
            text-align: center;
        }

        .header {
            border-bottom: 4px double #ffffff;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .title-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .start-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 25px auto;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 15px 0;
            text-align: left;
        }

        p:last-child {
            margin-bottom: 0;
        }

        a {
            color: #22c55e;
            text-decoration: none;
            border-bottom: 2px dashed #22c55e;
        }

        a:hover {
            color: #4ade80;
            border-bottom-style: solid;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #52525b;
            margin-top: 50px;
            border-top: 2px solid #27272a;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="newsletter-container">
        
        <div class="header">
            <img src="assets/images/title.png" alt="DELTARUNE Status Update" class="title-img">
        </div>

        <img src="assets/images/start.png" alt="Newsletter Introduction" class="start-img">

        <p>... It's Summer?</p>

    </div>

</body>
</html>
